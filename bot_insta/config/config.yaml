active_profile: default
gui:
  accent_gold: '#FFD700'
  accent_teal: '#008080'
  bg_color: '#1e1e24'
  theme: dark
paths:
  base_backgrounds: bot_insta/assets/backgrounds
  base_music: bot_insta/assets/music
  base_overlays: bot_insta/assets/overlays
  output_dir: bot_insta/exports
  session_file: bot_insta/config/session.json
  tiktok_cookies: bot_insta/config/tiktok_cookies.txt
  youtube_client_secrets: bot_insta/config/youtube_client_secrets.json
  youtube_token: bot_insta/config/youtube_token.json
profiles:
  default:
    audio:
      volume: 1.0
    backgrounds_subfolder: ''
    caption: '✨ Daily motivation 🚀 #motivation #mindset #daily'
    music_subfolder: ''
    overlay_image: ''
    quotes_file: bot_insta/config/quotes.txt
    text:
      color: white
      fadein: 0.47
      font_path: /usr/share/fonts/gnu-free/FreeSerifItalic.otf
      font_size: 56
      max_width: 880
      position:
      - center
      - 960
      stroke_color: black
      stroke_width: 0
      wrap_width: 30
    youtube_privacy: unlisted
  gym_motivation:
    audio:
      volume: 0.8
    backgrounds_subfolder: gym_videos
    caption: '💪 Gym motivation 🔥 #gym #fitness #grind'
    music_subfolder: phonk_music
    overlay_image: ''
    quotes_file: bot_insta/config/quotes_gym.txt
    text:
      color: '#FFD700'
      fadein: 0.8
      font_path: /usr/share/fonts/gnu-free/FreeSerifItalic.otf
      font_size: 80
      max_width: 900
      position:
      - center
      - 600
      stroke_color: black
      stroke_width: 2
      wrap_width: 25
video:
  audio_fadeout: 2
  duration: 10
  target_h: 1920
  target_w: 1080
